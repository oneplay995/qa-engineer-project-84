    - Поставить галку "В наличии"
  expected-result: |
    Успешно отображаются товары в наличии

- summary: |
    Пользователь должен иметь возможность удалить добавленный товар из корзины
  requirement: |
    Пользователь имеет возможность удалить товар из корзины
  prerequisites:
    Открыта главная страница
  test-data: |
    Товар добавлен в корзину
  steps:
    - Открыть главную страницу
    - Добавить товар в корзину
    - Открыть корзину
    - Удалить товар из корзины
  expected-result: |
    Товар успешно удален из корзины

- summary: |
    Пользователь должен иметь возможность полностью очистить добавленные товары из корзины
  requirement: |
    Пользователь имеет возможность очистить добавленные товары из корзины
  prerequisites:
    Открыта главная страница
  test-data: |
    Товары добавлены в корзину
  steps:
    - Открыть главную страницу
    - Добавить четыре товара в корзину
    - Открыть корзину
    - Нажать кнопку "Очистить корзину"
  expected-result: |
    Товары успешно очистлены из корзины

- summary: |
