    Успешное отображение локализации на русский и английский языки
  prerequisites:
    Открыта главная страница
  test-data: |
    Открыт список языков
  steps:
    - Открыта главная страница
    - Нажать "Language"
  expected-result: |
    Успешное отображение локализации на русский и английский языки

- summary: |
    Пользователь должен иметь возможность искать товары по наличию
