---
- summary: |
    Пользователь должен иметь возможность искать товары категории
  requirement: |
    Пользователь видит товар из выбранной категории 
  prerequisites:
    Открыт список категорий
  test-data: |
    Открыты категории beauty, fragrances, furniture, groceries
  steps:
    - Выбираем категорию beauty
  expected-result: |
    Отображаются товары из категории beauty

- summary: |
    Пользователь должен иметь возможность искать товары по ключевому слову
  requirement: |
    Отображаются товары заданные в поисковой строке 
  prerequisites:
    Открыта главная страница
  test-data: |
    Открыта поисквая строка
  steps:
    - Ввести в поисковую строку название товара Red Lipstick
  expected-result: |
    Успешно отображается товар Red Lipstick

- summary: |
    Пользователь должен иметь возможность фильтровать товары по цене
  requirement: |
    Отображаются отфильтрованные товары по цене
  prerequisites:
    Открыта главная страница
  test-data: |
    Выбрана стоимость товара от 2 до 3
  steps:
    - Открыть главную страницу
    - Указать стоимость от 2 до 3
  expected-result: |
    Успешно отображаются отфильтрованные товары по цене от 2 до 3
    
- summary: |
    Пользователь должен иметь возможность фильтровать товары по брэнду
  requirement: |
    Отображаются отфильтрованные товары по брэнду
  prerequisites:
    Открыта главная страница
  test-data: |
    Открыта главная страница
  steps:
    - Выбрать brand Dior 
  expected-result: |
    Успешно отображаются отфильтрованные товары по брэнду

- summary: |
    Пользователь должен иметь возможность фильтровать товары по категории и стоимости
  requirement: |
    Отображаются отфильтрованные товары по категории и стоимости
  prerequisites:
    Открыта главная страница
  test-data: |
    Выбрана категория beauty, стоимость от 10 до 15
  steps:
    - Выбрать категорию beauty
    - Указать стоимость от 10 до 15
  expected-result: |
    Успешно отображаются отфильтрованные товары по категории и стоимости

- summary: |
    Пользователь должен иметь возможность просматривать товары и просматривать подробную информацию о товаре
  requirement: |
    Успешный просмотр списка товаров и детальной информации о товаре
  prerequisites:
    Открыта главная страница
  test-data: |
    Отображаются разные товары на главной странице с подробной информацией
  steps:
    - Открыть главную страницу
    - Открыть несколько разных товаров
  expected-result: |
    Успешный просмотр товаров с подробной информацией

- summary: |
    Пользователь должен иметь возможность добавлять товары в корзину и просматривать содержимое корзины
  requirement: |
    Успешное добавление товаров в корзину и просмотр содержимого корзины
  prerequisites:
    Открыта главная страница
  test-data: |
    Добавлены несколько товаров в корзину
  steps:
    - Открыть главную страницу
    - Добавить несколько товаров в корзину
    - Открыть корзину
  expected-result: | 
    Успешно отображаются добавленные товары в корзину и содержимое корзины

- summary: |
    Пользователь должен иметь возможность переключить язык интерфейса
  requirement: |
    Язык интерфейса успешно переключается на English, Russian, Spanish
  prerequisites:
    Открыта главная страница
  test-data: |
    Открыт список предложенных языков
  steps:
    - Открыть главную страницу
    - Нажать "Language"
    - Выбрать "Russian"
  expected-result: |
    Язык успешно переключился на Russian
    
- summary: |
    Сайт должен иметь локализацию (перевод) на русский и английский языки
  requirement: |
    Успешное отображение локализации на русский и английский языки
  prerequisites:
    Открыта главная страница
  test-data: |
    Открыт список языков
  steps:
    - Открыта главная страница
    - Нажать "Language"
  expected-result: |
    Успешное отображение локализации на русский и английский языки
