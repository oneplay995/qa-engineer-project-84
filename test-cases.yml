---
- summary: |
    Пользователь должен иметь возможность искать товары категории
  requirement: |
    Пользователь видит товар из выбранной категории 
  prerequisites:
    Открыт список категорий
  test-data: |
    Открыты категории beauty, fragrances, furniture, groceries
  steps:
    - Выбираем категорию beauty
  expected-result: |
    Отображаются товары из категории beauty

- summary: |
    Пользователь должен иметь возможность искать товары по ключевому слову
  requirement: |
    Отображаются товары заданные в поисковой строке 
  prerequisites:
    Открыта главная страница
  test-data: |
    Открыта поисквая строка
  steps:
    - Ввести в поисковую строку название товара Red Lipstick
  expected-result: |
    Успешно отображается товар Red Lipstick

- summary: |
    Пользователь должен иметь возможность фильтровать товары по цене
  requirement: |
    Отображаются отфильтрованные товары по цене
  prerequisites:
    Открыта главная страница
  test-data: |
    Выбрана стоимость товара от 2 до 3
  steps:
    - Открыть главную страницу
    - Указать стоимость от 2 до 3
  expected-result: |
    Успешно отображаются отфильтрованные товары по цене от 2 до 3
    
- summary: |
    Пользователь должен иметь возможность фильтровать товары по брэнду
