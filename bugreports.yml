---
- summary: |
    Не работает фильтрация товаров
  environment: |
    Google Chrome 146.0.7680.165 (официальная сборка) (64 бит) OC Windows 11 Домашняя 26200.7840
  steps-to-reproduce: |
    1. Открыть главную страницу
    2. Ввести в поисковую строку Red Lipstick
    2. Выбрать категорию beauty
    3. Поставить галку "В наличии"
    4. Указать стоимость товара от 2 до 12
  expected-result: |
    Пользователь должен иметь возможность фильтровать товары
  actual-result: |
    В консоли браузера в Devtools не отображаются данные

- summary: |
    Пользователь не может добавлять товары в корзину и просматривать содержимое корзины
  environment: |
    Google Chrome 146.0.7680.165 (официальная сборка) (64 бит) OC Windows 11 Домашняя 26200.7840
  steps-to-reproduce: |
    1. Открыть главную страницу
    2. Добавить несколько товаров в корзину
    3. Открыть корзину
  expected-result: |
    Успешное добавление товар и просмотр корзины
  actual-result: |
    В консоли браузера в Devtools не отображаются данные

