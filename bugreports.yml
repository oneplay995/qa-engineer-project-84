---
- summary: |
    Не работает фильтрация товаров
  environment: |
    Google Chrome 146.0.7680.165 (официальная сборка) (64 бит) OC Windows 11 Домашняя 26200.7840
  steps-to-reproduce: |
    1. Открыть главную страницу
    2. Ввести в поисковую строку Red Lipstick
    2. Выбрать категорию beauty
    3. Поставить галку "В наличии"
    4. Указать стоимость товара от 2 до 12
  expected-result: |
    Пользователь должен иметь возможность фильтровать товары
  actual-result: |
    Не работает фильтрация товаров

- summary: |
    Пользователь не может оформить товар
  environment: |
    Google Chrome 146.0.7680.165 (официальная сборка) (64 бит) OC Windows 11 Домашняя 26200.7840
  steps-to-reproduce: |
    1. Открыть главную страницу
    2. Добавить товар в корзину
    3. Открыть корзину
    4. Нажать кнопку "Оформить заказ"
  expected-result: |
    Успешное оформление товара
  actual-result: |
    Не оформляется товар
    В консоли браузера в Devtools выходит ошибка https://dummyjson.com/http/500/failed 500 (Internal Server Error)

- summary: |
    Отсутсвует переключение языка интерфейса и локализация сайта на русский, и английский языки
  environment: |
    Google Chrome 146.0.7680.165 (официальная сборка) (64 бит) OC Windows 11 Домашняя 26200.7840
  steps-to-reproduce: |
    1. Открыть главную страницу
    2. Нажать "Language"
    3. Выбрать "Russian"
  expected-result: |
    Успешно отображается локализация сайта и переключение языка интерфеса
  actual-result: |
    Не отображается перевод о подробной информации товара
