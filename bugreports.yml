- summary: |
    Пользователь не может оформить товар
  environment: |
    Google Chrome 146.0.7680.165 (официальная сборка) (64 бит) OC Windows 11 Домашняя 26200.7840
  steps-to-reproduce: |
    1. Открыть главную страницу
    2. Добавить товар в корзину
    3. Открыть корзину
